name: preview-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-preview:
    if: false
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build preview bundles and upload to draft release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: preview-v__VERSION__
          releaseName: "Chord Launchpad Preview v__VERSION__"
          releaseBody: |
            Preview build for Chord Launchpad.

            Included platforms:
            - Windows x64
          releaseDraft: true
          prerelease: true
