name: preview-release

on:
  workflow_dispatch:
  push:
    tags:
      - "preview-v*"

permissions:
  contents: write

jobs:
  build-preview:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            args: ""
          - name: macos-arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macos-x64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build preview bundles and upload to draft release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: preview-v__VERSION__
          releaseName: "Chord Launchpad Preview v__VERSION__"
          releaseBody: |
            Preview build for Chord Launchpad.

            Included platforms:
            - Windows x64
            - macOS Apple Silicon
            - macOS Intel

            Note:
            - macOS artifacts are unsigned preview builds unless Apple signing secrets are added later.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
